<!DOCTYPE html>
<html lang="vi">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Shorten - Modern</title>
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
      <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
      <style>
         body {
         font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
         }
      </style>
   </head>
   <body class="bg-slate-50 dark:bg-[#0b0f19] text-slate-900 dark:text-white min-h-screen flex flex-col">
      <!-- HEADER -->
      <header class="border-b border-slate-200 dark:border-slate-800">
         <div class="max-w-xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
               <div class="w-9 h-9 rounded-xl bg-blue-600 flex items-center justify-center text-white">
                  <i class="fa-solid fa-link"></i>
               </div>
               <span class="font-semibold">Shorten</span>
            </div>
            <span class="text-xs text-slate-400">Shlink UI</span>
         </div>
      </header>
      <!-- TOAST -->
      <div id="toast"
         class="fixed top-5 left-1/2 -translate-x-1/2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-4 py-2 rounded-full text-sm shadow opacity-0 pointer-events-none transition z-50">
         <i id="toast-icon" class="fa-solid fa-circle-check text-blue-500 mr-1"></i>
         <span id="toast-msg"></span>
      </div>
      <!-- MAIN -->
      <main class="flex-1 flex justify-center items-center px-4 py-10">
         <div class="w-full max-w-xl space-y-6">
            <!-- FORM CARD -->
            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-5">
               <h1 class="text-lg font-semibold mb-4">Rút gọn link</h1>
               <form id="shorten-form" class="space-y-3">
                  <input id="long-url" type="url" required
                     placeholder="Dán URL dài..."
                     class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 focus:ring-2 focus:ring-blue-500 outline-none">
                  <input id="custom-slug" type="text"
                     placeholder="Custom slug (optional)"
                     class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 focus:ring-2 focus:ring-blue-500 outline-none">
                  <button id="btn-submit" class="w-full py-3 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-medium flex justify-center gap-2 cursor-pointer transition-colors">
                  <span id="btn-text">Tạo shortlink</span>
                  <span id="btn-spinner" class="hidden"><i class="fa-solid fa-spinner animate-spin"></i></span>
                  </button>
               </form>
            </div>
            <!-- RESULT CARD -->
            <div id="result-card" class="hidden bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-5">
               <div class="flex justify-between mb-3">
                  <span class="text-green-600 text-sm font-medium">✔ Created</span>
                  <button onclick="hideResult()" class="text-slate-400 cursor-pointer hover:text-slate-600 dark:hover:text-slate-200">✕</button>
               </div>
               <!-- Hàng 1: Ô chứa Link chiếm trọn chiều ngang -->
               <div class="mb-3">
                  <input id="generated-url" readonly
                     class="w-full px-3 py-3 rounded-xl bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-blue-500 font-medium text-center focus:outline-none">
               </div>
               <!-- Hàng 2: Hai nút bấm điều khiển nằm dưới chia đôi đều nhau -->
               <div class="grid grid-cols-2 gap-3">
                  <button onclick="copyGeneratedUrl()" class="w-full py-2.5 rounded-xl bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 font-medium text-sm transition-colors flex items-center justify-center gap-2 cursor-pointer">
                  <i class="fa-solid fa-copy"></i>
                  <span>Copy Link</span>
                  </button>
                  <button onclick="toggleQR()" class="w-full py-2.5 rounded-xl bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 font-medium text-sm transition-colors flex items-center justify-center gap-2 cursor-pointer">
                  <i class="fa-solid fa-qrcode"></i>
                  <span>Mã QR</span>
                  </button>
               </div>
               <!-- Hàng 3: Vùng chứa ảnh QR Code -->
               <div id="qrcode-box" class="hidden mt-4 p-4 rounded-xl bg-slate-50 dark:bg-slate-950 border border-slate-100 dark:border-slate-800/50 flex justify-center"></div>
            </div>
            <!-- HISTORY -->
            <div>
               <div class="text-xs uppercase text-slate-400 mb-2">History</div>
               <div id="history-list"
                  class="rounded-2xl border border-slate-200 dark:border-slate-800 overflow-hidden bg-white dark:bg-slate-900 divide-y divide-slate-200 dark:divide-slate-800">
                  <div class="p-4 text-center text-sm text-slate-400">Empty</div>
               </div>
            </div>
         </div>
      </main>
      <script>
         const STORAGE_KEY = "shlink_pro_history";
         
         
         
         /* FORM SUBMIT */
         
         document.getElementById("shorten-form").addEventListener("submit", async (e) => {
         
         e.preventDefault();
         
         
         
         const btn = document.getElementById("btn-submit");
         
         const text = document.getElementById("btn-text");
         
         const spin = document.getElementById("btn-spinner");
         
         
         
         btn.disabled = true;
         
         text.classList.add("hidden");
         
         spin.classList.remove("hidden");
         
         
         
         try {
         
         const res = await fetch(`${document.getElementById("api-base-url").value}/rest/v3/short-urls`, {
         
         method: "POST",
         
         headers: {
         
         "Content-Type": "application/json",
         
         "X-Api-Key": document.getElementById("api-key").value
         
         },
         
         body: JSON.stringify({
         
         longUrl: document.getElementById("long-url").value,
         
         customSlug: document.getElementById("custom-slug").value || undefined
         
         })
         
         });
         
         
         
         const data = await res.json();
         
         if (!res.ok) throw new Error(data.detail || "Error");
         
         
         
         document.getElementById("generated-url").value = data.shortUrl;
         
         document.getElementById("result-card").classList.remove("hidden");
         
         
         
         const box = document.getElementById("qrcode-box");
         
         box.innerHTML = "";
         
         box.classList.add("hidden");
         
         
         
         new QRCode(box, {
         
         text: data.shortUrl,
         
         width: 140,
         
         height: 140
         
         });
         
         
         
         addHistory(data.shortUrl, document.getElementById("long-url").value);
         
         document.getElementById("long-url").value = "";
         
         document.getElementById("custom-slug").value = "";
         
         
         
         toast("Tạo link thành công!");
         
         } catch (err) {
         
         toast(err.message, "error");
         
         } finally {
         
         btn.disabled = false;
         
         text.classList.remove("hidden");
         
         spin.classList.add("hidden");
         
         }
         
         });
         
         
         
         /* UI HELPERS */
         
         function hideResult() {
         
         document.getElementById("result-card").classList.add("hidden");
         
         }
         
         
         
         function toggleQR() {
         
         document.getElementById("qrcode-box").classList.toggle("hidden");
         
         }
         
         
         
         function copyGeneratedUrl() {
         
         navigator.clipboard.writeText(
         
         document.getElementById("generated-url").value
         
         );
         
         toast("Đã copy vào bộ nhớ tạm");
         
         }
         
         
         
         /* TOAST */
         
         function toast(msg, type="success") {
         
         const t = document.getElementById("toast");
         
         document.getElementById("toast-msg").innerText = msg;
         
         
         
         t.classList.remove("opacity-0");
         
         t.classList.add("opacity-100");
         
         
         
         setTimeout(() => {
         
         t.classList.add("opacity-0");
         
         }, 2000);
         
         }
         
         
         
         /* HISTORY */
         
         function addHistory(shortUrl, longUrl) {
         
         let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
         
         data = data.filter(i => i.shortUrl !== shortUrl);
         
         data.unshift({shortUrl, longUrl});
         
         localStorage.setItem(STORAGE_KEY, JSON.stringify(data.slice(0,6)));
         
         renderHistory();
         
         }
         
         
         
         function renderHistory() {
         
         const box = document.getElementById("history-list");
         
         const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
         
         
         
         if (!data.length) {
         
         box.innerHTML = `<div class="p-4 text-center text-sm text-slate-400">Empty</div>`;
         
         return;
         
         }
         
         
         
         box.innerHTML = "";
         
         
         
         data.forEach(i => {
         
         const div = document.createElement("div");
         
         div.className = "p-3 flex justify-between items-center hover:bg-slate-100 dark:hover:bg-slate-800 cursor-pointer transition-colors";
         
         
         
         div.innerHTML = `
         
         <div class="min-w-0 pr-3">
         
         <div class="text-sm text-blue-500 font-medium truncate">${i.shortUrl}</div>
         
         <div class="text-xs text-slate-400 truncate">${i.longUrl}</div>
         
         </div>
         
         <button class="text-xs font-medium text-slate-400 shrink-0">Copy</button>
         
         `;
         
         
         
         div.onclick = () => {
         
         navigator.clipboard.writeText(i.shortUrl);
         
         toast("Đã copy");
         
         };
         
         
         
         box.appendChild(div);
         
         });
         
         }
         
         
         
         window.onload = renderHistory;
         
      </script>
      <!-- hidden config -->
      <div class="hidden">
         <input id="api-base-url" value="https://s.8biz.net">
         <input id="api-key" value="68foEYp8VCpkCSVUTqpoLhxBfg81C9Uu">
      </div>
   </body>
</html>
